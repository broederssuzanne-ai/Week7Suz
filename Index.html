<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather app</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <div class="weather-app">
    <header>
      <form id="search-form">
        <input
          type="search"
          placeholder="Enter a city.."
          required
          class="search-input"
          id="search-input"
        />
        <input
          type="submit"
          value="Search"
          class="search-button"
        />
      </form>
    </header>

    <main>
      <div class="current-weather">
        <div>
          <h1 class="current-city" id="current-city">Paris</h1>
          <p class="current-details">
       <span id="current-date"></span>, <span id="description">scattered clouds</span>
     <br />
       Humidity: <strong id="humidity">66%</strong>, Wind:
       <strong id="wind-speed">3.13km/h</strong>
     </p>
        </div>

        <div class="current-temperature">
          <span class="current-temperature-icon">☀️</span>
          <span class="current-temperature-value" id="current-temperature">12</span>
          <span class="current-temperature-unit">°C</span>
        </div>
      </div>
    </main>

    <footer>
      Coded by
      <a href="https://github.com/broederssuzanne-ai" target="_blank">
        Suzanne
      </a>
      is open-sourced on
      <a href="https://github.com/broederssuzanne-ai/PKUS-Week6" target="_blank">
        GitHub
      </a>
      and hosted on
      <a href="https://app.netlify.com/projects/week7suz/overview/" target="_blank">
        Netlify
      </a>
    </footer>
  </div>

  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="src/index.js"></script>
</body>
</html>
